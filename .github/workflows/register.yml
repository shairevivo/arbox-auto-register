name: Arbox Auto-Register

on:
  schedule:
    # Runs hourly. The script checks registrationDay and registrationTime
    # from the config and skips if it's not the right day/hour in Israel.
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node src/register.mjs
        env:
          ARBOX_EMAIL: ${{ secrets.ARBOX_EMAIL }}
          ARBOX_PASSWORD: ${{ secrets.ARBOX_PASSWORD }}
          ARBOX_CONFIG: ${{ secrets.ARBOX_CONFIG }}
          ARBOX_WHITELABEL: ${{ secrets.ARBOX_WHITELABEL }}
          ARBOX_FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
